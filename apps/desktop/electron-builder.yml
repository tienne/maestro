appId: com.maestro.desktop
productName: Maestro
copyright: Copyright © 2024 Maestro

# 네이티브 모듈은 pnpm.onlyBuiltDependencies가 설치 시 빌드하므로
# electron-builder의 npm rebuild(pnpm 모노레포에서 깨짐)는 비활성화한다.
# 단, 설치 빌드는 시스템 Node ABI 기준이므로 패키징/실행 전 Electron ABI로
# 맞추려면 `nx run desktop:rebuild`(electron-rebuild)를 선행해야 한다.
# (`pnpm rebuild`는 시스템 ABI라 Electron에서 NODE_MODULE_VERSION 불일치 발생)
npmRebuild: false

directories:
  buildResources: icons
  output: dist-build

files:
  - out/**/*
  - node_modules/**/*
  - package.json

# native module은 app.asar 내부에서 dlopen 불가 → 반드시 unpack
asarUnpack:
  - node_modules/better-sqlite3/**
  - node_modules/node-pty/**

extraResources:
  - from: icons
    to: icons

mac:
  category: public.app-category.developer-tools
  icon: icons/icon.icns
  # 코드사이닝 없이 테스트 가능하도록 설정
  hardenedRuntime: true
  gatekeeperAssess: false
  # Apple Silicon + Intel 모두 지원
  target:
    - target: dmg
      arch:
        - arm64
        - x64

dmg:
  title: Maestro
  icon: icons/icon.icns

win:
  icon: icons/icon.ico
  # Windows x64 빌드
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# GitHub Releases 퍼블리싱 (draft)
publish:
  provider: github
  releaseType: draft
